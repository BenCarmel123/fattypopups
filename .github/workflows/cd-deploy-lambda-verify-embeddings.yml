name: CD - Deploy Verify Embeddings Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'lambdas/verify-embeddings/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip lambda
        run: |
          cd lambdas/verify-embeddings
          zip -r ../../verify-embeddings.zip . --exclude "node_modules/*" "*.zip"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name fattypopups-verify-embeddings \
            --zip-file fileb://verify-embeddings.zip
